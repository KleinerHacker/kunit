site_name: KUnit
site_description: Kotlin Unit Framework to calculate with different units in Kotlin (and Java)
# Must include the mike version segment (here the "latest" alias). mkdocs-static-i18n
# derives the language-selector links on the landing pages from site_url's path; without
# the version segment those links point to /ko/, /zh/, ... at the domain root (404 under
# mike, which deploys every version under /kunit/<version>/). Deep pages use relative
# links and are unaffected.
site_url: https://kleinerhacker.github.io/kunit/latest/
repo_name: kunit
repo_url: https://github.com/KleinerHacker/kunit
docs_dir: docs
site_dir: ../build/docs

theme:
  name: material
  logo: assets/images/icon-light.png
  favicon: assets/images/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  version:
    provider: mike
    default: latest

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
      toc_depth: 3


plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
