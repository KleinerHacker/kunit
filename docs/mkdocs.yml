site_name: KUnit
site_description: Kotlin Unit Framework to calculate with different units in Kotlin (and Java)
# Must include the mike version segment (here the "latest" alias). mkdocs-static-i18n
# derives the language-selector links on the landing pages from site_url's path; without
# the version segment those links point to /ko/, /zh/, ... at the domain root (404 under
# mike, which deploys every version under /kunit/<version>/). Deep pages use relative
# links and are unaffected.
site_url: https://kleinerhacker.github.io/kunit/latest/
repo_name: kunit
repo_url: https://github.com/KleinerHacker/kunit
docs_dir: docs
site_dir: ../build/docs

theme:
  name: material
  logo: assets/images/icon-light.png
  favicon: assets/images/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
      toc_depth: 3


plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Mixed Units: 혼합 단위
            Adding Custom Units: 사용자 정의 단위 추가
            Predefined Units: 미리 정의된 단위
            Constructed Units: 구성된 단위
            Distance: 거리
            Time: 시간
            Frequency: 주파수
            Mass: 질량
            Electric Current: 전류
            Storage: 저장 용량
            Temperature: 온도
            Overview: 개요
            Absolute Temperature: 절대 온도
            Temperature Difference: 온도 차
            Speed: 속도
            Data Rate: 데이터 전송률
            Acceleration: 가속도
            Force: 힘
            Pressure: 압력
            Density: 밀도
            Area Density: 면밀도
            API Docs: API 문서
            Licences: 라이선스
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Mixed Units: 混合单位
            Adding Custom Units: 添加自定义单位
            Predefined Units: 预定义单位
            Constructed Units: 构造单位
            Distance: 距离
            Time: 时间
            Frequency: 频率
            Mass: 质量
            Electric Current: 电流
            Storage: 存储
            Temperature: 温度
            Overview: 概述
            Absolute Temperature: 绝对温度
            Temperature Difference: 温度差
            Speed: 速度
            Data Rate: 数据速率
            Acceleration: 加速度
            Force: 力
            Pressure: 压力
            Density: 密度
            Area Density: 面密度
            API Docs: API 文档
            Licences: 许可证
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Mixed Units: 混合単位
            Adding Custom Units: カスタム単位の追加
            Predefined Units: 定義済み単位
            Constructed Units: 構成単位
            Distance: 距離
            Time: 時間
            Frequency: 周波数
            Mass: 質量
            Electric Current: 電流
            Storage: ストレージ
            Temperature: 温度
            Overview: 概要
            Absolute Temperature: 絶対温度
            Temperature Difference: 温度差
            Speed: 速度
            Data Rate: データレート
            Acceleration: 加速度
            Force: 力
            Pressure: 圧力
            Density: 密度
            Area Density: 面密度
            API Docs: API ドキュメント
            Licences: ライセンス

nav:
  - Home: index.md
  - Mixed Units: mixed-units.md
  - Adding Custom Units: custom-units.md
  - Predefined Units:
      - Distance: units/distance.md
      - Time: units/time.md
      - Frequency: units/frequency.md
      - Mass: units/mass.md
      - Electric Current: units/ec.md
      - Storage: units/storage.md
      - Temperature:
          - Overview: units/temperature-overview.md
          - Absolute Temperature: units/temperature.md
          - Temperature Difference: units/temperature-difference.md
  - Constructed Units:
      - Speed: units/speed.md
      - Data Rate: units/datarate.md
      - Acceleration: units/acceleration.md
      - Force: units/force.md
      - Pressure: units/pressure.md
      - Density: units/density.md
      - Area Density: units/areadensity.md
  - API Docs: dokka/html/index.html
  - Licences: licences/index.html
