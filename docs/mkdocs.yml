site_name: KUnit
site_description: Kotlin Unit Framework to calculate with different units in Kotlin (and Java)
# Must include the mike version segment (here the "latest" alias). mkdocs-static-i18n
# derives the language-selector links on the landing pages from site_url's path; without
# the version segment those links point to /ko/, /zh/, ... at the domain root (404 under
# mike, which deploys every version under /kunit/<version>/). Deep pages use relative
# links and are unaffected.
site_url: https://kleinerhacker.github.io/kunit/latest/
repo_name: kunit
repo_url: https://github.com/KleinerHacker/kunit
docs_dir: docs
site_dir: ../build/docs

theme:
  name: material
  logo: assets/images/icon-light.png
  favicon: assets/images/icon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
      toc_depth: 3


plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: ko
          name: 한국어
          build: true
          nav_translations:
            Home: 홈
            Mixed Units: 혼합 단위
            Adding Custom Units: 사용자 정의 단위 추가
            Predefined Units: 미리 정의된 단위
            Constructed Units: 구성된 단위
            Length: 길이
            Time: 시간
            Speed: 속도
            API Docs: API 문서
            Licences: 라이선스
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Mixed Units: 混合单位
            Adding Custom Units: 添加自定义单位
            Predefined Units: 预定义单位
            Constructed Units: 构造单位
            Length: 长度
            Time: 时间
            Speed: 速度
            API Docs: API 文档
            Licences: 许可证
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Mixed Units: 混合単位
            Adding Custom Units: カスタム単位の追加
            Predefined Units: 定義済み単位
            Constructed Units: 構成単位
            Length: 長さ
            Time: 時間
            Speed: 速度
            API Docs: API ドキュメント
            Licences: ライセンス

nav:
  - Home: index.md
  - Mixed Units: mixed-units.md
  - Adding Custom Units: custom-units.md
  - Predefined Units:
      - Length: units/length.md
      - Time: units/time.md
  - Constructed Units:
      - Speed: units/speed.md
  - API Docs: dokka/html/index.html
  - Licences: licences/index.html
