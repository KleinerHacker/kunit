name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: write

jobs:
  check-licences:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check licences
        run: ./gradlew licensee --stacktrace --info

  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test --stacktrace --info

      - name: Run tests
        run: ./gradlew test --stacktrace --info

  # Build the docs as a generation test (mkdocs --strict) on every push and PR.
  # No deployment here — that only happens for pushes (see deploy-snapshot-docs).
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Pip Update
        run: pip install --upgrade pip

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build docs
        run: ./gradlew buildDocs --stacktrace --info

  deploy-docs:
    runs-on: ubuntu-latest
    needs: validate-docs
    steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: 3.x

        - name: Pip Update
          run: pip install --upgrade pip

        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '25'
            cache: gradle

        - name: Make Gradle wrapper executable
          run: chmod +x ./gradlew

        - name: Deploy
          run: ./gradlew deployDocs --stacktrace --info