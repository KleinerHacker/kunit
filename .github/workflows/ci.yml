name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

permissions:
  contents: write

jobs:
  check-licences:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Check licences
        run: ./gradlew licensee --stacktrace --info

  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build -x test --stacktrace --info

      - name: Run tests
        run: ./gradlew test --stacktrace --info

  # Build the docs as a generation test (mkdocs --strict) on every push and PR.
  # No deployment here — that only happens for pushes (see deploy-snapshot-docs).
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Pip Update
        run: pip install --upgrade pip

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build docs
        run: ./gradlew buildDocs --stacktrace --info

  deploy-docs:
    runs-on: ubuntu-latest
    needs: validate-docs
    # Only deploy on pushes to main/master — never on pull requests (fork PRs have a
    # read-only token, and deploying docs per PR is undesirable anyway).
    if: github.event_name == 'push'
    steps:
        - name: Checkout repository
          uses: actions/checkout@v7
          with:
            # Full history so mike can read/update the gh-pages branch reliably.
            fetch-depth: 0

        - name: Set up Python
          uses: actions/setup-python@v6
          with:
            python-version: 3.x

        - name: Pip Update
          run: pip install --upgrade pip

        - name: Set up JDK
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: '25'
            cache: gradle

        - name: Make Gradle wrapper executable
          run: chmod +x ./gradlew

        - name: Configure Git identity for mike
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        - name: Deploy
          run: ./gradlew deployDocs --stacktrace --info